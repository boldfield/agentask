apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: agentask-fleet
  labels:
    app.kubernetes.io/name: agentask-fleet
    app.kubernetes.io/component: worker
spec:
  # Matches the laptop fleet (4 workers). Apply to the amd64 (cp) cluster — workers build/test the
  # target repo and need build memory.
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentask-fleet
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: docker.summercamp.eastharbor.casa:32050/agentask/fleet:latest
          args: ["--kind", "implement"]
          env:
            - name: AGENTASK_URL
              value: "https://agentask.summercamp.eastharbor.casa"
            - name: AGENTASK_PROJECT
              value: "all" # multi-project: clone each board's repo on demand
            - name: AGENTASK_DELIVERY_MODE
              value: "pull_request"
            - name: HOME
              value: /home/agent
            - name: AGENTASK_HOME
              value: /home/agent/.agentask
            - name: AGENTASK_TOKEN
              valueFrom: { secretKeyRef: { name: agentask-fleet, key: token } }
            # Subscription auth — a long-lived `claude setup-token`, NOT an API key.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom: { secretKeyRef: { name: claude-oauth, key: token } }
            # Throttle parallel build jobs so a single tool build doesn't blow the memory limit.
            - name: CARGO_BUILD_JOBS
              value: "2"
            - name: GOMAXPROCS
              value: "2"
          volumeMounts:
            - { name: home, mountPath: /home/agent } # clones + worktrees live here (ephemeral)
            - { name: forge-tokens, mountPath: /etc/fleet, readOnly: true }
          resources:
            requests: { cpu: "500m", memory: "2Gi" }
            limits: { cpu: "2", memory: "6Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: home
          emptyDir: { sizeLimit: 20Gi }
        - name: forge-tokens
          secret:
            secretName: agentask-forge-tokens
