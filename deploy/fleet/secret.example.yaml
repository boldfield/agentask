# Fleet secrets — DO NOT commit real values. Prefer creating these with `kubectl create secret`
# (below) so tokens never land in a file. Both go in the `agentask-fleet` namespace.
#
# 1) The Agentask bearer token (same value the server's `agentask-secret` holds):
#
#    TOKEN=$(kubectl --context admin@summercamp-cp -n agentask \
#              get secret agentask-secret -o jsonpath='{.data.token}' | base64 -d)
#    kubectl --context <target-cluster> -n agentask-fleet \
#      create secret generic agentask-fleet --from-literal=token="$TOKEN"
#
# 2) The forge tokens file (per-owner PATs: `owner=token` per line — e.g. faictory + boldfield),
#    straight from your local ~/.agentask/forge-tokens:
#
#    kubectl --context <target-cluster> -n agentask-fleet \
#      create secret generic agentask-forge-tokens \
#      --from-file=forge-tokens="$HOME/.agentask/forge-tokens"
#
# 3) (workers/reviewers only) The claude subscription token — a long-lived `claude setup-token`
#    value, NOT an API key. The merger doesn't need this:
#
#    claude setup-token   # prints a token
#    kubectl --context admin@summercamp-cp -n agentask-fleet \
#      create secret generic claude-oauth --from-literal=token='<paste-token>'
#
# 4) (reviewers only) The codex subscription auth — codex reads ~/.codex/auth.json. Create by
#    running `codex login` on a local machine, then:
#
#    kubectl --context <target-cluster> -n agentask-fleet \
#      create secret generic codex-auth \
#      --from-file=auth.json="$HOME/.codex/auth.json"
#
# The YAML below is only a shape reference (stringData shown for readability; never check in real tokens):
---
apiVersion: v1
kind: Secret
metadata:
  name: agentask-fleet
  namespace: agentask-fleet
type: Opaque
stringData:
  token: "<agentask-bearer-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: claude-oauth # workers + reviewers only
  namespace: agentask-fleet
type: Opaque
stringData:
  token: "<claude-setup-token>"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentask-forge-tokens
  namespace: agentask-fleet
type: Opaque
stringData:
  forge-tokens: |
    faictory=<token>
    boldfield=<token>
---
apiVersion: v1
kind: Secret
metadata:
  name: codex-auth # reviewers only
  namespace: agentask-fleet
type: Opaque
stringData:
  auth.json: |
    <codex-auth-json>
