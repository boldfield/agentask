apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentask
  namespace: agentask
spec:
  # CRITICAL: replicas must be 1. Do not scale beyond 1.
  # Reason: SQLite is a single-writer database, and the PersistentVolume uses local-path
  # storage which is node-local. Running multiple replicas will cause database corruption.
  # To scale horizontally, the storage layer must be replaced with a distributed database
  # (e.g., PostgreSQL, CockroachDB) and the PVC access mode changed to ReadWriteMany.
  replicas: 1
  strategy:
    # Recreate ensures the old pod is terminated before the new one starts,
    # avoiding concurrent access to the single-writer SQLite database.
    type: Recreate
  selector:
    matchLabels:
      app: agentask
  template:
    metadata:
      labels:
        app: agentask
    spec:
      # Pod-level securityContext to satisfy the 'restricted' Pod Security Standard.
      # The distroless:nonroot image runs as uid/gid 65532; fsGroup makes the
      # local-path PVC writable by that group so SQLite can write to /data.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agentask
        # NOTE: This image must be built and pushed to the registry (or loaded into the cluster) first.
        # Build with: docker build -t ghcr.io/boldfield/agentask:latest .
        # Push with: docker push ghcr.io/boldfield/agentask:latest
        # Or load into kind/minikube: kind load docker-image ghcr.io/boldfield/agentask:latest
        # Pinned to a released version tag for reproducible deploys. Bump on each release.
        image: ghcr.io/boldfield/agentask:v0.14.1
        imagePullPolicy: IfNotPresent
        # Container-level securityContext (also required by 'restricted').
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: AGENTASK_DB
          value: /data/agentask.db
        - name: AGENTASK_ADDR
          value: ":8080"
        - name: AGENTASK_TOKEN
          valueFrom:
            secretKeyRef:
              name: agentask-secret
              key: token
        # AGENTASK_MODELS is the VALIDATION ALLOWLIST (which models a task.model / review_models entry
        # may use). gpt-5.5 is allowed as a review-ONLY model (codex CLI; see reviewer-deployment.yaml)
        # but is deliberately NOT an escalation tier.
        - name: AGENTASK_MODELS
          value: "haiku,sonnet,opus,fable,gpt-5.5"
        # AGENTASK_ESCALATION_LADDER is the SEPARATE, ordered worker-escalation ladder (must be a
        # subset of the allowlist; defaults to AGENTASK_MODELS when unset). Set explicitly to EXCLUDE
        # gpt-5.5 from escalation. list order = tiers; fable is the top tier (last resort).
        - name: AGENTASK_ESCALATION_LADDER
          value: "haiku,sonnet,opus,fable"
        # Per-tier value = consecutive reject rounds before escalating to the next ladder model.
        - name: AGENTASK_ESCALATION_THRESHOLDS
          value: "haiku=6,sonnet=4,opus=2,fable=1"
        # Notify loop -> notifier-proxy (internal/notify). No-op when NOTIFY_URL is unset.
        - name: NOTIFY_URL
          value: "https://notifier.summercamp.eastharbor.casa"
        - name: NOTIFY_TOKEN
          valueFrom:
            secretKeyRef:
              name: notify-token
              key: NOTIFY_TOKEN
        # PR-watch reconciler reads PRs with per-owner forge tokens from the file mounted below.
        - name: FORGE_TOKENS
          value: /etc/fleet/forge-tokens
        volumeMounts:
        - name: data
          mountPath: /data
        - name: forge-tokens
          mountPath: /etc/fleet
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: agentask-data
      # Per-owner GitHub tokens for the in-server PR-watch reconciler. Created out-of-band
      # (see secret.yaml.example) — copied from the agentask-fleet namespace's fleet token.
      - name: forge-tokens
        secret:
          secretName: agentask-forge-tokens
