apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentask
spec:
  # CRITICAL: replicas must be 1. Do not scale beyond 1.
  # Reason: SQLite is a single-writer database, and the PersistentVolume uses local-path
  # storage which is node-local. Running multiple replicas will cause database corruption.
  # To scale horizontally, the storage layer must be replaced with a distributed database
  # (e.g., PostgreSQL, CockroachDB) and the PVC access mode changed to ReadWriteMany.
  replicas: 1
  strategy:
    # Recreate ensures the old pod is terminated before the new one starts,
    # avoiding concurrent access to the single-writer SQLite database.
    type: Recreate
  selector:
    matchLabels:
      app: agentask
  template:
    metadata:
      labels:
        app: agentask
    spec:
      # Pod-level securityContext to satisfy the 'restricted' Pod Security Standard.
      # The distroless:nonroot image runs as uid/gid 65532; fsGroup makes the
      # local-path PVC writable by that group so SQLite can write to /data.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: agentask
        # NOTE: This image must be built and pushed to the registry (or loaded into the cluster) first.
        # Build with: docker build -t ghcr.io/boldfield/agentask:latest .
        # Push with: docker push ghcr.io/boldfield/agentask:latest
        # Or load into kind/minikube: kind load docker-image ghcr.io/boldfield/agentask:latest
        # Pinned to a released version tag for reproducible deploys. Bump on each release.
        image: ghcr.io/boldfield/agentask:v0.2.0
        imagePullPolicy: IfNotPresent
        # Container-level securityContext (also required by 'restricted').
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: AGENTASK_DB
          value: /data/agentask.db
        - name: AGENTASK_ADDR
          value: ":8080"
        - name: AGENTASK_TOKEN
          valueFrom:
            secretKeyRef:
              name: agentask-secret
              key: token
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: agentask-data
